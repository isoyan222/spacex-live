name: Deploy to Xserver

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sv16317.xserver.jp
          username: xs771078
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 10022
          source: "index.html,about.html,privacy.html,manifest.json,sitemap.xml,sw.js,favicon.jpg,favicon.svg,css/,js/,textures/"
          target: /home/xs771078/spacex-live.com/public_html/spacex.zip/
          overwrite: true
